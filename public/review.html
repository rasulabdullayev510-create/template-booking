<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>How was your visit?</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--white:#fff;--bg:#f7f7f5;--rule:#e4e1db;--ink:#111110;--ink2:#444440;--ink3:#888884;--ice:#1a6bff;--ice-light:#eef3ff;--green:#16a34a;--green-light:#dcfce7;--red:#dc2626}
body{background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif;font-weight:400;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--white);border:1.5px solid var(--rule);border-radius:20px;padding:48px 40px;width:100%;max-width:420px}
.logo{font-size:15px;color:var(--ink3);margin-bottom:32px;font-weight:600}
.greeting{font-family:'Instrument Serif',serif;font-size:38px;color:var(--ink);line-height:1.1;margin-bottom:8px}
.svc-tag{display:inline-block;background:var(--ice-light);color:var(--ice);border-radius:6px;padding:4px 12px;font-size:12px;font-weight:600;letter-spacing:0.05em;margin-bottom:20px}
.sub{font-size:14px;color:var(--ink3);line-height:1.7;margin-bottom:32px}
.stars{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.star{font-size:40px;cursor:pointer;transition:transform 0.12s;opacity:0.25;user-select:none}
.star:hover,.star.on{opacity:1;transform:scale(1.08)}
.star-lbl{text-align:center;font-size:13px;color:var(--ink3);margin-bottom:24px;min-height:20px}
textarea{width:100%;border:1.5px solid var(--rule);border-radius:10px;padding:12px 15px;font-family:'Manrope',sans-serif;font-size:14px;color:var(--ink);outline:none;resize:none;min-height:84px;margin-bottom:18px;transition:border-color 0.14s;background:var(--white);display:none}
textarea:focus{border-color:var(--ice);background:var(--ice-light)}
textarea::placeholder{color:#ccc}
.btn{width:100%;background:var(--ink);color:white;border:none;border-radius:10px;padding:14px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.16s;display:none}
.btn:hover:not(:disabled){background:var(--ice)}
.btn:disabled{opacity:0.3;cursor:default}
.redirecting{text-align:center;font-size:14px;color:var(--ink3);display:none;padding:12px 0}
.done{display:none;text-align:center}
.done-check{width:64px;height:64px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.done-check svg{width:28px;height:28px}
.done-title{font-family:'Instrument Serif',serif;font-size:38px;color:var(--ink);margin-bottom:8px}
.done-sub{font-size:14px;color:var(--ink3);line-height:1.7;margin-bottom:24px}
@media(max-width:480px){.card{padding:36px 24px}.greeting{font-size:30px}}
</style>
</head>
<body>
<div class="card">
  <div class="logo" id="biz-logo">Loading...</div>
  <div id="form-screen">
    <div class="greeting" id="greeting">How was your visit?</div>
    <div class="svc-tag" id="svc-tag">Loading...</div>
    <p class="sub">Takes 20 seconds. Your feedback helps us keep improving.</p>
    <div class="stars" id="stars">
      <span class="star" data-v="1">⭐</span>
      <span class="star" data-v="2">⭐</span>
      <span class="star" data-v="3">⭐</span>
      <span class="star" data-v="4">⭐</span>
      <span class="star" data-v="5">⭐</span>
    </div>
    <div class="star-lbl" id="star-lbl">Tap to rate</div>
    <div class="redirecting" id="redirecting">Taking you to Google... ✓</div>
    <textarea id="comment" placeholder="What could we have done better? (optional)"></textarea>
    <button class="btn" id="sub-btn" onclick="submitLowRating()">Send Feedback</button>
  </div>
  <div class="done" id="done-screen">
    <div class="done-check"><svg viewBox="0 0 28 28" fill="none"><path d="M5 14L11 20L23 8" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div class="done-title" id="done-title">Thank you!</div>
    <p class="done-sub" id="done-sub">Your feedback means a lot to us.</p>
  </div>
</div>
<script>
const API = window.location.origin;
const token = new URLSearchParams(window.location.search).get('token');
let rating = 0;
const labels = ['','Disappointing','Could be better','It was okay','Really good!','Perfect! ⭐'];

fetch(API + '/api/info').then(r=>r.json()).then(d=>{
  document.getElementById('biz-logo').textContent = d.businessName || '';
}).catch(()=>{ document.getElementById('biz-logo').textContent = ''; });

async function init() {
  if (!token) { document.getElementById('svc-tag').textContent = 'Invalid link'; return; }
  try {
    const r = await fetch(API + '/api/review/' + token);
    if (!r.ok) { document.getElementById('svc-tag').textContent = 'Booking not found'; return; }
    const d = await r.json();
    document.getElementById('greeting').textContent = 'Hey ' + d.customerName.split(' ')[0] + '!';
    document.getElementById('svc-tag').textContent = d.serviceName;
    if (d.alreadyReviewed) {
      document.getElementById('form-screen').style.display = 'none';
      document.getElementById('done-screen').style.display = 'block';
      document.getElementById('done-title').textContent = 'Already submitted';
      document.getElementById('done-sub').textContent = "You've already reviewed this visit. Thanks!";
    }
  } catch { document.getElementById('svc-tag').textContent = 'Could not load'; }
}

document.querySelectorAll('.star').forEach(function(s) {
  s.addEventListener('click', function() {
    rating = parseInt(s.dataset.v);
    document.querySelectorAll('.star').forEach(function(st, i) { st.classList.toggle('on', i < rating); });
    document.getElementById('star-lbl').textContent = labels[rating];

    if (rating >= 4) {
      // Auto-submit and redirect immediately
      document.getElementById('redirecting').style.display = 'block';
      document.getElementById('comment').style.display = 'none';
      document.getElementById('sub-btn').style.display = 'none';
      autoSubmitHigh();
    } else {
      // Show comment + submit for low ratings
      document.getElementById('redirecting').style.display = 'none';
      document.getElementById('comment').style.display = 'block';
      document.getElementById('sub-btn').style.display = 'block';
    }
  });
  s.addEventListener('mouseover', function() {
    var v = parseInt(s.dataset.v);
    document.querySelectorAll('.star').forEach(function(st, i) { st.style.opacity = i < v ? '1' : '0.25'; });
    document.getElementById('star-lbl').textContent = labels[v];
  });
  s.addEventListener('mouseout', function() {
    document.querySelectorAll('.star').forEach(function(st, i) { st.style.opacity = i < rating ? '1' : '0.25'; });
    document.getElementById('star-lbl').textContent = rating ? labels[rating] : 'Tap to rate';
  });
});

async function autoSubmitHigh() {
  try {
    const r = await fetch(API + '/api/review', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, rating, comment: '' })
    });
    const d = await r.json();
    if (d.googleReviewLink) {
      window.location.href = d.googleReviewLink;
    } else {
      // Fallback if no google link configured
      document.getElementById('form-screen').style.display = 'none';
      document.getElementById('done-screen').style.display = 'block';
      document.getElementById('done-title').textContent = 'Thank you!';
      document.getElementById('done-sub').textContent = "We really appreciate the kind words!";
    }
  } catch(e) {
    document.getElementById('redirecting').textContent = 'Something went wrong. Please try again.';
  }
}

async function submitLowRating() {
  const btn = document.getElementById('sub-btn');
  btn.textContent = 'Sending...'; btn.disabled = true;
  try {
    await fetch(API + '/api/review', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, rating, comment: document.getElementById('comment').value.trim() })
    });
    document.getElementById('form-screen').style.display = 'none';
    document.getElementById('done-screen').style.display = 'block';
    document.getElementById('done-title').textContent = 'Thanks for letting us know';
    document.getElementById('done-sub').textContent = "We're sorry it wasn't perfect. We'll use this to do better. Hope to see you again!";
  } catch(e) {
    btn.textContent = 'Send Feedback'; btn.disabled = false;
  }
}

init();
</script>
</body>
</html>
